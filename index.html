<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101722">
  <title>Kingshot Rally Sync Timer | Kingdom 1564</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="badge">1564</div>
      <div>
        <p class="eyebrow">KINGSHOT TOOL</p>
        <h1>Rally Sync Timer</h1>
        <p class="sub">同步集結倒數工具 · Kingdom 1564</p>
      </div>
    </header>

    <section class="card">
      <div class="section-head">
        <div>
          <span class="step">01</span>
          <h2>Rally Count <small>集結數量</small></h2>
        </div>
        <span class="tag">5 MIN RALLY</span>
      </div>

      <div class="count-grid" id="countGrid">
        <button class="count-btn active" data-count="2">2<span>雙重</span></button>
        <button class="count-btn" data-count="3">3<span>三重</span></button>
        <button class="count-btn" data-count="4">4<span>四重</span></button>
        <button class="count-btn" data-count="5">5<span>五重</span></button>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <div>
          <span class="step">02</span>
          <h2>Players <small>玩家與行軍時間</small></h2>
        </div>
      </div>

      <div class="column-head">
        <span>Player<br><small>玩家</small></span>
        <span>Min<br><small>分鐘</small></span>
        <span>Sec<br><small>秒數</small></span>
      </div>

      <div id="playersList" class="players-list"></div>

      <div class="actions">
        <button id="calculateBtn" class="btn primary">Calculate · 計算</button>
        <button id="resetBtn" class="btn secondary">Reset · 重設</button>
      </div>
      <p id="errorMessage" class="message error" aria-live="polite"></p>
    </section>

    <section id="resultCard" class="card hidden">
      <div class="section-head">
        <div>
          <span class="step">03</span>
          <h2>Rally Order <small>集結順序</small></h2>
        </div>
      </div>

      <div id="resultList" class="result-list"></div>

      <div class="actions">
        <button id="startBtn" class="btn primary">Start Countdown · 開始倒數</button>
        <button id="copyBtn" class="btn secondary">Copy Result · 複製結果</button>
      </div>
      <p id="copyMessage" class="message success" aria-live="polite"></p>
    </section>
  </main>

  <section id="countdownScreen" class="countdown hidden" aria-live="assertive">
    <div class="countdown-bar">
      <span>RALLY SYNC · 1564</span>
      <button id="closeBtn" class="close-btn" aria-label="關閉">✕</button>
    </div>

    <div class="countdown-center">
      <p class="countdown-kicker">NEXT PLAYER · 下一位</p>
      <h2 id="countdownPlayer">Player</h2>
      <p id="countdownInstruction">OPEN IN · 剩餘時間</p>
      <div id="countdownNumber">0</div>
      <p id="countdownIndex">1 / 2</p>
    </div>

    <div class="countdown-actions">
      <button id="pauseBtn" class="btn secondary">Pause · 暫停</button>
      <button id="restartBtn" class="btn secondary">Restart · 重來</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
